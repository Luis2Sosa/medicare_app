name: medicare_app
description: "Aplicación de recordatorio de medicamentos (MediCare)"
publish_to: 'none'

version: 1.0.9+11

environment:
  sdk: '>=3.9.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_sign_in: ^6.2.1
  provider: ^6.1.2

  sqflite: ^2.4.1
  path: ^1.9.0

  url_launcher: ^6.3.1
  shared_preferences: ^2.3.3

  # 🔊 Sonido y Vibración
  vibration: ^3.1.8
  just_audio: ^0.9.31

  # 🔔 Notificaciones Locales
  flutter_local_notifications: ^17.2.4
  timezone: ^0.9.4

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/medicare_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    # Apuntar a la carpeta completa es mejor práctica para incluir el logo,
    # el icono y cualquier recurso visual futuro de una sola vez
    - assets/images/